<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tier List Maker 2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --surface-hover: #334155;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            
            /* Tier Colors */
            --tier-s: #ef4444; /* Vermelho */
            --tier-a: #f97316; /* Laranja */
            --tier-b: #eab308; /* Amarelo */
            --tier-c: #22c55e; /* Verde */
            --tier-d: #3b82f6; /* Azul */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 40px;
            background: linear-gradient(to right, #38bdf8, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        /* Container Principal */
        .board {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 40px;
        }

        /* Linhas da Tier List */
        .tier-row {
            display: flex;
            background-color: var(--surface-color);
            border-radius: 12px;
            overflow: hidden;
            min-height: 120px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease;
        }

        .tier-label {
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: rgba(0, 0, 0, 0.6);
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .tier-s .tier-label { background-color: var(--tier-s); }
        .tier-a .tier-label { background-color: var(--tier-a); }
        .tier-b .tier-label { background-color: var(--tier-b); }
        .tier-c .tier-label { background-color: var(--tier-c); }
        .tier-d .tier-label { background-color: var(--tier-d); }

        /* Área onde os itens ficam */
        .drop-zone {
            flex-grow: 1;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-content: flex-start;
            transition: background-color 0.3s ease;
        }

        .drop-zone.drag-over {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Banco de Itens (Pool) */
        .item-pool-wrapper {
            width: 100%;
            max-width: 1000px;
            background-color: var(--surface-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .controls input {
            flex-grow: 1;
            background-color: var(--bg-color);
            border: 2px solid transparent;
            color: var(--text-color);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .controls input:focus {
            border-color: var(--accent);
        }

        .controls button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .controls button:hover {
            background-color: var(--accent-hover);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        /* Estilo dos Itens (Cartas) */
        .item {
            width: 100px;
            height: 100px;
            background-color: var(--surface-hover);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 10px;
            cursor: grab;
            user-select: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.1s, box-shadow 0.1s;
            word-wrap: break-word;
        }

        .item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border-color: var(--accent);
        }

        .item:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .item.dragging {
            opacity: 0.4;
        }

        /* Mobile tweaks */
        @media (max-width: 600px) {
            .tier-label { width: 80px; font-size: 2rem; }
            .item { width: 80px; height: 80px; font-size: 0.75rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <h1>Tier List Maker 2.0</h1>

    <div class="board">
        <div class="tier-row tier-s">
            <div class="tier-label">S</div>
            <div class="drop-zone"></div>
        </div>
        <div class="tier-row tier-a">
            <div class="tier-label">A</div>
            <div class="drop-zone"></div>
        </div>
        <div class="tier-row tier-b">
            <div class="tier-label">B</div>
            <div class="drop-zone"></div>
        </div>
        <div class="tier-row tier-c">
            <div class="tier-label">C</div>
            <div class="drop-zone"></div>
        </div>
        <div class="tier-row tier-d">
            <div class="tier-label">D</div>
            <div class="drop-zone"></div>
        </div>
    </div>

    <div class="item-pool-wrapper">
        <div class="controls">
            <input type="text" id="newItemInput" placeholder="Digite o nome de um item e aperte Enter...">
            <button id="addItemBtn">Adicionar</button>
        </div>
        <div class="drop-zone item-pool" id="itemPool">
            <div class="item" draggable="true">Doom</div>
            <div class="item" draggable="true">Life is Strange</div>
            <div class="item" draggable="true">The Cat Lady</div>
            <div class="item" draggable="true">Rocksmith 2014</div>
            <div class="item" draggable="true">Nirvana</div>
            <div class="item" draggable="true">Tagima 530</div>
            <div class="item" draggable="true">Visual Novels</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dropZones = document.querySelectorAll('.drop-zone');
            const itemPool = document.getElementById('itemPool');
            const input = document.getElementById('newItemInput');
            const btn = document.getElementById('addItemBtn');

            let draggedElement = null;

            // Função para inicializar eventos de drag and drop nos itens
            function makeItemDraggable(item) {
                item.addEventListener('dragstart', function(e) {
                    draggedElement = this;
                    setTimeout(() => this.classList.add('dragging'), 0);
                    e.dataTransfer.effectAllowed = 'move';
                });

                item.addEventListener('dragend', function() {
                    this.classList.remove('dragging');
                    draggedElement = null;
                });
            }

            // Inicializar itens existentes
            document.querySelectorAll('.item').forEach(makeItemDraggable);

            // Configurar zonas de drop (Tiers e o Banco)
            dropZones.forEach(zone => {
                zone.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.classList.add('drag-over');
                });

                zone.addEventListener('dragleave', function() {
                    this.classList.remove('drag-over');
                });

                zone.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('drag-over');
                    if (draggedElement) {
                        this.appendChild(draggedElement);
                    }
                });
            });

            // Lógica para adicionar novos itens
            function addNewItem() {
                const text = input.value.trim();
                if (text === '') return;

                const newItem = document.createElement('div');
                newItem.classList.add('item');
                newItem.setAttribute('draggable', 'true');
                newItem.textContent = text;
                
                makeItemDraggable(newItem);
                itemPool.appendChild(newItem);
                
                input.value = '';
                input.focus();
            }

            btn.addEventListener('click', addNewItem);
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addNewItem();
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Novel Engine - Retro/Grime Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --bg-dark: #0a0a0a;
            --text-color: #e0e0e0;
            --vn-width: 800px;
            --vn-height: 600px;
        }

        body {
            background-color: #111;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #777;
            text-shadow: 2px 2px #333;
        }

        /* O Container da Tela do Jogo */
        #game-screen {
            width: var(--vn-width);
            height: var(--vn-height);
            position: relative;
            background-color: var(--bg-dark);
            border: 4px solid #222;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
        }

        /* A Imagem de Fundo da Cena */
        #scene-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            /* Filtro sujo base na imagem: desaturação, contraste alto e um tom sépia esverdeado */
            filter: grayscale(80%) sepia(40%) hue-rotate(60deg) contrast(150%) brightness(0.8);
            transition: opacity 0.3s;
        }

        /* Caixa de Diálogo (Textbox) */
        #dialogue-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 150px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #555;
            border-radius: 4px;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Texto Retrô */
        #dialogue-text {
            font-family: 'VT323', monospace;
            font-size: 28px;
            color: #d4d4d4;
            text-shadow: 1px 1px 0px #000;
            margin: 0;
            line-height: 1.2;
        }

        /* O NOME do Filtro Sujo (Overlay CSS) */
        /* Isso cria as linhas de TV antiga e a vinheta escura nas bordas */
        #game-screen::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none; /* Para os cliques passarem direto por ele */
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%);
            background-size: 100% 4px, 100% 100%;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* Animação de Ruído/Estática (Noise) */
        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            opacity: 0.15;
            pointer-events: none;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* Controles do Editor */
        .editor-controls {
            width: var(--vn-width);
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: bold;
            color: #aaa;
            font-size: 14px;
        }

        input[type="file"] {
            background: #222;
            color: white;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
        }

        button {
            background: #555;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.2s;
        }

        button:hover { background: #777; }

    </style>
</head>
<body>

    <h1>VN Engine Builder</h1>

    <div id="game-screen">
        <img id="scene-bg" src="" style="display: none;" alt="Background">
        <div class="noise-overlay"></div>
        
        <div id="dialogue-box">
            <p id="dialogue-text">Aguardando inserção de texto...</p>
        </div>
    </div>

    <div class="editor-controls">
        <div class="control-group">
            <label for="image-upload">Upload da Cena (Imagem):</label>
            <input type="file" id="image-upload" accept="image/png, image/jpeg, image/webp">
        </div>
        
        <div class="control-group">
            <label for="text-input">Texto do Diálogo:</label>
            <textarea id="text-input" placeholder="Digite a fala do personagem aqui..."></textarea>
        </div>

        <button id="update-btn">Atualizar Cena</button>
    </div>

    <script>
        const imageUpload = document.getElementById('image-upload');
        const sceneBg = document.getElementById('scene-bg');
        const textInput = document.getElementById('text-input');
        const dialogueText = document.getElementById('dialogue-text');
        const updateBtn = document.getElementById('update-btn');

        // Atualiza a imagem e o texto quando o botão for clicado
        updateBtn.addEventListener('click', () => {
            
            // 1. Atualizar o Texto
            if (textInput.value.trim() !== '') {
                dialogueText.textContent = textInput.value;
            }

            // 2. Atualizar a Imagem usando FileReader (Lê o arquivo do PC do usuário sem precisar de servidor)
            const file = imageUpload.files[0];
            if (file) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    sceneBg.src = e.target.result;
                    sceneBg.style.display = 'block';
                }
                
                reader.readAsDataURL(file);
            }
        });

        // Efeito "Máquina de Escrever" simples para testar
        sceneBg.parentElement.addEventListener('click', () => {
            const fullText = dialogueText.textContent;
            dialogueText.textContent = '';
            let i = 0;
            
            function typeWriter() {
                if (i < fullText.length) {
                    dialogueText.textContent += fullText.charAt(i);
                    i++;
                    setTimeout(typeWriter, 30); // Velocidade da digitação
                }
            }
            typeWriter();
        });
    </script>
</body>
</html>
